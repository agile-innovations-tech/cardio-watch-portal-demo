name: Run unit tests and publish to Xray

on:
  workflow_dispatch:

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        id: unit_tests
        continue-on-error: true
        run: pnpm --filter @workspace/cardiowatch-portal run test

      - name: Verify JUnit results file exists
        run: |
          test -f artifacts/cardiowatch-portal/test-results/junit.xml

      - name: Authenticate to Xray Cloud
        id: xray_auth
        env:
          XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
          XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}
        run: |
          TOKEN=$(curl --fail-with-body -sS \
            -H "Content-Type: application/json" \
            -X POST \
            --data "{\"client_id\":\"$XRAY_CLIENT_ID\",\"client_secret\":\"$XRAY_CLIENT_SECRET\"}" \
            https://xray.cloud.getxray.app/api/v2/authenticate | tr -d '"')

          if [ -z "$TOKEN" ]; then
            echo "Failed to obtain Xray token"
            exit 1
          fi

          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Upload JUnit results to Xray
        env:
          XRAY_TOKEN: ${{ steps.xray_auth.outputs.token }}
          XRAY_PROJECT_KEY: ${{ secrets.XRAY_PROJECT_KEY }}
        run: |
          curl --fail-with-body -sS \
            -H "Authorization: Bearer $XRAY_TOKEN" \
            -H "Content-Type: text/xml" \
            -X POST \
            --data @"artifacts/cardiowatch-portal/test-results/junit.xml" \
            "https://xray.cloud.getxray.app/api/v2/import/execution/junit?projectKey=$XRAY_PROJECT_KEY"

      - name: Fail workflow if unit tests failed
        if: steps.unit_tests.outcome == 'failure'
        run: |
          echo "Unit tests failed. Results were still uploaded to Xray."
          exit 1
